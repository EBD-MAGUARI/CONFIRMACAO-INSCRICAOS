<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in — Conferência EBD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --azul-900: #0D1F3C;
  --azul-800: #1A3A6B;
  --azul-600: #2B5BA8;
  --azul-100: #D6E4F7;
  --azul-50:  #EDF4FC;
  --ouro-700: #8C6A0E;
  --ouro-500: #C8991A;
  --ouro-300: #E8C55A;
  --ouro-100: #FAF0CC;
  --verde-800: #0A4422;
  --verde-700: #0F5C2E;
  --verde-500: #1A7A42;
  --verde-200: #A8D9BF;
  --verde-100: #D4EFE0;
  --verde-50:  #EDFAF3;
  --laranja-700: #8B3A0A;
  --laranja-500: #C85A1A;
  --laranja-100: #FDEEE5;
  --cinza-800: #1C1C1E;
  --cinza-600: #3C3C3E;
  --cinza-400: #6C6C70;
  --cinza-200: #D1D1D6;
  --cinza-100: #E5E5EA;
  --cinza-50:  #F2F2F7;
  --branco: #FFFFFF;
  --vermelho-700: #7A1515;
  --vermelho-500: #C0392B;
  --vermelho-100: #FDECEA;
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--cinza-50);
  color: var(--cinza-800);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ── */
.topbar {
  background: var(--azul-900);
  border-bottom: 2px solid var(--ouro-500);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-icon {
  width: 32px; height: 32px;
  background: var(--ouro-500);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
}
.topbar-icon svg { width: 16px; height: 16px; stroke: var(--azul-900); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.topbar-name { font-family: 'EB Garamond', Georgia, serif; font-size: 16px; color: var(--branco); font-weight: 600; }
.topbar-sep { color: rgba(255,255,255,0.25); }
.topbar-sub { font-size: 13px; color: rgba(255,255,255,0.5); }
.mode-badge {
  background: rgba(200,153,26,0.18);
  border: 1px solid rgba(200,153,26,0.4);
  color: var(--ouro-300);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 100px;
}

/* ── Counter bar ── */
.counter-bar {
  background: var(--azul-800);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}
.counter-item { display: flex; align-items: baseline; gap: 6px; }
.counter-num { font-size: 20px; font-weight: 600; color: var(--branco); font-variant-numeric: tabular-nums; }
.counter-label { font-size: 12px; color: rgba(255,255,255,0.5); }
.counter-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.12); }

/* ── Main ── */
.main {
  flex: 1;
  padding: 28px 16px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

/* ── Search panel ── */
.search-panel {
  background: var(--branco);
  border: 1px solid var(--cinza-200);
  border-radius: 14px;
  width: 100%;
  max-width: 500px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.search-panel-head {
  padding: 16px 20px 0;
}
.panel-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--cinza-400);
  margin-bottom: 12px;
}
.tabs { display: flex; border-bottom: 1px solid var(--cinza-100); }
.tab-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  padding: 9px 16px;
  border: none; background: transparent; cursor: pointer;
  color: var(--cinza-400);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--azul-800); }
.tab-btn.active { color: var(--azul-800); border-bottom-color: var(--azul-800); }

.search-panel-body { padding: 18px 20px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.field-label {
  display: block;
  font-size: 12px; font-weight: 600;
  color: var(--cinza-600);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 6px;
}
.field-input {
  width: 100%; height: 46px;
  padding: 0 14px;
  border: 1.5px solid var(--cinza-200);
  border-radius: 9px;
  font-size: 15px; font-family: 'DM Sans', sans-serif;
  color: var(--cinza-800); background: var(--cinza-50);
  outline: none;
  transition: border-color .15s, background .15s, box-shadow .15s;
  margin-bottom: 14px;
}
.field-input::placeholder { color: var(--cinza-400); }
.field-input:focus {
  border-color: var(--azul-600);
  background: var(--branco);
  box-shadow: 0 0 0 3px var(--azul-50);
}

.btn-buscar {
  width: 100%; height: 46px;
  background: var(--azul-800); color: var(--branco);
  border: none; border-radius: 9px;
  font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .15s, transform .1s;
}
.btn-buscar:hover { background: var(--azul-600); }
.btn-buscar:active { transform: scale(0.985); }
.btn-buscar:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.btn-buscar svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

/* ── Feedback inline ── */
.msg-box {
  display: none;
  margin-top: 12px;
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 13px; font-weight: 500;
  align-items: center; gap: 9px; line-height: 1.5;
}
.msg-box.show { display: flex; }
.msg-box.loading { background: var(--azul-50); color: var(--azul-800); border: 1px solid var(--azul-100); }
.msg-box.erro    { background: var(--vermelho-100); color: var(--vermelho-500); border: 1px solid #F5C6C3; }
.msg-box svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.spinner { width: 15px; height: 15px; border: 2px solid var(--azul-100); border-top-color: var(--azul-600); border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Result card ── */
.result-card {
  background: var(--branco);
  border: 1px solid var(--cinza-200);
  border-radius: 14px;
  width: 100%;
  max-width: 500px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  display: none;
}
.result-card.visible { display: block; }

/* State variants */
.result-card.state-encontrado  { border-color: var(--azul-100); }
.result-card.state-confirmado  { border-color: var(--verde-200); }
.result-card.state-ja-presente { border-color: var(--ouro-300); }

.result-card-top {
  padding: 18px 20px 14px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  border-bottom: 1px solid var(--cinza-100);
}
.avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--azul-100);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 600;
  color: var(--azul-800);
  flex-shrink: 0;
  letter-spacing: -.5px;
}
.result-name { font-size: 16px; font-weight: 600; color: var(--cinza-800); margin-bottom: 3px; line-height: 1.3; }
.result-meta { font-size: 13px; color: var(--cinza-400); }
.result-status {
  margin-left: auto;
  font-size: 11px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 5px 11px; border-radius: 100px;
  white-space: nowrap; flex-shrink: 0;
}
.status-pendente   { background: var(--azul-50);  color: var(--azul-600);  border: 1px solid var(--azul-100); }
.status-presente   { background: var(--verde-100); color: var(--verde-700); border: 1px solid var(--verde-200); }
.status-ja-estava  { background: var(--ouro-100);  color: var(--ouro-700);  border: 1px solid var(--ouro-300); }

.result-data {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--cinza-100);
  border-bottom: 1px solid var(--cinza-100);
}
.data-cell {
  background: var(--branco);
  padding: 10px 14px;
}
.data-cell.full { grid-column: 1 / -1; }
.data-cell-label { font-size: 11px; color: var(--cinza-400); font-weight: 600; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 2px; }
.data-cell-value { font-size: 13px; color: var(--cinza-800); font-weight: 500; }

.result-actions { padding: 16px 20px; display: flex; gap: 8px; flex-wrap: wrap; }

/* ── CTA de confirmação ── */
.btn-confirmar {
  flex: 1;
  min-width: 0;
  height: 50px;
  background: var(--verde-500); color: var(--branco);
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .15s, transform .1s;
  letter-spacing: .1px;
}
.btn-confirmar:hover { background: var(--verde-700); }
.btn-confirmar:active { transform: scale(0.98); }
.btn-confirmar:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.btn-confirmar svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

/* Confirmado state */
.btn-confirmar.done {
  background: var(--verde-700);
  pointer-events: none;
}

/* Já estava presente */
.result-already {
  background: var(--ouro-100);
  border: 1px solid var(--ouro-300);
  border-left: 3px solid var(--ouro-500);
  border-radius: 8px;
  padding: 11px 14px;
  font-size: 13px;
  color: var(--ouro-700);
  line-height: 1.6;
  width: 100%;
}
.result-already strong { font-weight: 600; }

.btn-nova-busca {
  height: 50px; padding: 0 18px;
  background: var(--branco);
  border: 1.5px solid var(--cinza-200);
  border-radius: 10px;
  font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  color: var(--cinza-600); cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background .15s, border-color .15s;
  white-space: nowrap;
}
.btn-nova-busca:hover { background: var(--cinza-50); border-color: var(--cinza-400); }
.btn-nova-busca svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

/* ── Success overlay ── */
.success-toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--verde-800);
  color: var(--branco);
  padding: 14px 22px;
  border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 600;
  box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  opacity: 0;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.success-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.success-toast svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

/* ── Recent list ── */
.recent-section {
  width: 100%;
  max-width: 500px;
}
.recent-header {
  font-size: 11px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--cinza-400);
  padding: 0 4px;
  margin-bottom: 8px;
}
.recent-list {
  display: flex; flex-direction: column; gap: 4px;
}
.recent-item {
  background: var(--branco);
  border: 1px solid var(--cinza-100);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  animation: fadeUp .25s ease forwards;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.recent-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--verde-500);
  flex-shrink: 0;
}
.recent-name { font-size: 13px; font-weight: 500; color: var(--cinza-800); flex: 1; }
.recent-time { font-size: 12px; color: var(--cinza-400); white-space: nowrap; }

/* Responsive */
@media (max-width: 480px) {
  .counter-bar { gap: 14px; }
  .counter-num { font-size: 18px; }
  .result-data { grid-template-columns: 1fr; }
  .data-cell.full { grid-column: 1; }
  .topbar-sub { display: none; }
}
</style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-icon">
      <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <span class="topbar-name">EBD · AD Maguari</span>
    <span class="topbar-sep">·</span>
    <span class="topbar-sub">Conferência 2025</span>
  </div>
  <div class="mode-badge">Check-in</div>
</header>

<!-- Counter bar -->
<div class="counter-bar">
  <div class="counter-item">
    <span class="counter-num" id="cnt-presentes">0</span>
    <span class="counter-label">presentes</span>
  </div>
  <div class="counter-divider"></div>
  <div class="counter-item">
    <span class="counter-num" id="cnt-inscritos">—</span>
    <span class="counter-label">inscritos</span>
  </div>
  <div class="counter-divider"></div>
  <div class="counter-item">
    <span class="counter-num" id="cnt-pct">—</span>
    <span class="counter-label">% presença</span>
  </div>
</div>

<!-- Main -->
<main class="main">

  <!-- Search -->
  <div class="search-panel" id="search-panel">
    <div class="search-panel-head">
      <div class="panel-label">Buscar participante</div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('nome', this)">Nome</button>
        <button class="tab-btn" onclick="switchTab('telefone', this)">Telefone</button>
        <button class="tab-btn" onclick="switchTab('pedido', this)">Nº pedido</button>
      </div>
    </div>
    <div class="search-panel-body">
      <div id="tab-nome" class="tab-panel active">
        <label class="field-label" for="inp-nome">Nome completo</label>
        <input class="field-input" type="text" id="inp-nome" placeholder="Ex: Judite Ferreira Moura" autocomplete="off">
      </div>
      <div id="tab-telefone" class="tab-panel">
        <label class="field-label" for="inp-telefone">Telefone com DDD</label>
        <input class="field-input" type="tel" id="inp-telefone" placeholder="Ex: (91) 99234-6353" autocomplete="off">
      </div>
      <div id="tab-pedido" class="tab-panel">
        <label class="field-label" for="inp-pedido">Número do pedido</label>
        <input class="field-input" type="text" id="inp-pedido" placeholder="Ex: EBD-1781732110398" autocomplete="off">
      </div>

      <button class="btn-buscar" id="btn-buscar" onclick="buscar()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Buscar participante
      </button>

      <div class="msg-box" id="msg-box"></div>
    </div>
  </div>

  <!-- Result card -->
  <div class="result-card" id="result-card">
    <div class="result-card-top">
      <div class="avatar" id="r-avatar">??</div>
      <div style="flex:1; min-width:0;">
        <div class="result-name" id="r-nome">—</div>
        <div class="result-meta" id="r-meta">—</div>
      </div>
      <div class="result-status status-pendente" id="r-status-pill">Aguardando</div>
    </div>

    <div class="result-data">
      <div class="data-cell">
        <div class="data-cell-label">Congregação</div>
        <div class="data-cell-value" id="r-congregacao">—</div>
      </div>
      <div class="data-cell">
        <div class="data-cell-label">Área</div>
        <div class="data-cell-value" id="r-area">—</div>
      </div>
      <div class="data-cell">
        <div class="data-cell-label">Grupo</div>
        <div class="data-cell-value" id="r-grupo">—</div>
      </div>
      <div class="data-cell">
        <div class="data-cell-label">Nº do pedido</div>
        <div class="data-cell-value" id="r-pedido">—</div>
      </div>
    </div>

    <div class="result-actions" id="result-actions"></div>
  </div>

  <!-- Recentes -->
  <div class="recent-section" id="recent-section" style="display:none;">
    <div class="recent-header">Confirmados agora</div>
    <div class="recent-list" id="recent-list"></div>
  </div>

</main>

<!-- Toast -->
<div class="success-toast" id="toast">
  <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-text">Presença confirmada!</span>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuHiBRbzAJ3JeGn_gMMyLiwMQUPtr8eq_A_1DMFDOxzhsGLt4pLmwAQf9CnhoXAOHtWg/exec";

  let tabAtual = "nome";
  let inscricaoAtual = null;
  let cntPresentes = 0;
  let cntInscritos = null;

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function switchTab(tab, btn) {
    tabAtual = tab;
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    clearMsg();
    setTimeout(() => document.getElementById('inp-' + tab)?.focus(), 60);
  }

  // ── Mensagens ─────────────────────────────────────────────────────────────
  function showMsg(tipo, texto) {
    const el = document.getElementById('msg-box');
    el.className = 'msg-box show ' + tipo;
    if (tipo === 'loading') {
      el.innerHTML = `<div class="spinner"></div><span>${texto}</span>`;
    } else {
      el.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>${texto}</span>`;
    }
  }
  function clearMsg() {
    const el = document.getElementById('msg-box');
    el.className = 'msg-box'; el.innerHTML = '';
  }

  // ── Busca ─────────────────────────────────────────────────────────────────
  async function buscar() {
    clearMsg();
    const map  = { nome: 'inp-nome', telefone: 'inp-telefone', pedido: 'inp-pedido' };
    const term = document.getElementById(map[tabAtual]).value.trim();
    if (!term) { showMsg('erro', 'Preencha o campo antes de buscar.'); return; }

    const btn = document.getElementById('btn-buscar');
    btn.disabled = true;
    showMsg('loading', 'Buscando participante…');
    ocultarResultado();

    try {
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ acao: 'buscarInscricao', tipoBusca: tabAtual, termoBusca: term })
      });
      if (!resp.ok) { showMsg('erro', `Erro do servidor (HTTP ${resp.status}).`); return; }
      let dados;
      try { dados = JSON.parse(await resp.text()); }
      catch { showMsg('erro', 'Resposta inesperada do servidor.'); return; }

      if (!dados.ok || !dados.inscricao) {
        showMsg('erro', dados.mensagem || 'Participante não encontrado. Verifique os dados.');
        return;
      }

      clearMsg();
      inscricaoAtual = dados.inscricao;
      // Se vier totais da planilha, atualiza
      if (dados.totalInscritos) atualizarContador(null, dados.totalInscritos);
      renderResultado(dados.inscricao);

    } catch (err) {
      showMsg('erro', 'Não foi possível conectar. Verifique sua conexão.');
      console.error(err);
    } finally {
      btn.disabled = false;
    }
  }

  // ── Render resultado ───────────────────────────────────────────────────────
  function renderResultado(ins) {
    const jaPresente = !!ins.presente; // campo booleano vindo da planilha

    // Avatar com iniciais
    const partes = (ins.nome || '').trim().split(' ');
    const iniciais = partes.length >= 2
      ? partes[0][0] + partes[partes.length - 1][0]
      : (ins.nome || '??').substring(0, 2);
    document.getElementById('r-avatar').textContent = iniciais.toUpperCase();

    document.getElementById('r-nome').textContent        = ins.nome || '—';
    document.getElementById('r-meta').textContent        = ins.telefone || '—';
    document.getElementById('r-congregacao').textContent = ins.congregacao || '—';
    document.getElementById('r-area').textContent        = ins.area || '—';
    document.getElementById('r-grupo').textContent       = ins.grupo ? 'Grupo ' + ins.grupo : '—';
    document.getElementById('r-pedido').textContent      = ins.orderId || '—';

    // Status pill
    const pill = document.getElementById('r-status-pill');
    if (jaPresente) {
      pill.textContent = '✓ Presente';
      pill.className = 'result-status status-presente';
    } else {
      pill.textContent = 'Aguardando';
      pill.className = 'result-status status-pendente';
    }

    // Actions
    const actions = document.getElementById('result-actions');
    if (jaPresente) {
      actions.innerHTML = `
        <div class="result-already">
          <strong>Presença já confirmada anteriormente.</strong> Este participante foi registrado como presente. Não é necessária nenhuma ação.
        </div>
        <button class="btn-nova-busca" style="margin-top:8px; width:100%; justify-content:center;" onclick="novaBusca()">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Buscar outro participante
        </button>`;
    } else {
      actions.innerHTML = `
        <button class="btn-confirmar" id="btn-confirmar" onclick="confirmarPresenca()">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Confirmar presença
        </button>
        <button class="btn-nova-busca" onclick="novaBusca()">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Voltar
        </button>`;
    }

    const card = document.getElementById('result-card');
    card.className = 'result-card visible ' + (jaPresente ? 'state-ja-presente' : 'state-encontrado');
  }

  function ocultarResultado() {
    document.getElementById('result-card').className = 'result-card';
    document.getElementById('result-actions').innerHTML = '';
  }

  // ── Confirmar presença ────────────────────────────────────────────────────
  async function confirmarPresenca() {
    if (!inscricaoAtual) return;

    const btn = document.getElementById('btn-confirmar');
    btn.disabled = true;
    btn.innerHTML = `<div class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:#fff;"></div> Confirmando…`;

    try {
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ acao: 'confirmarPresenca', orderId: inscricaoAtual.orderId })
      });

      let dados;
      try { dados = JSON.parse(await resp.text()); }
      catch { dados = { ok: false }; }

      if (dados.ok !== false) {
        // Sucesso — atualiza UI
        inscricaoAtual.presente = true;
        atualizarContador(cntPresentes + 1, cntInscritos);
        adicionarRecente(inscricaoAtual.nome);
        mostrarToast(`✓ ${inscricaoAtual.nome?.split(' ')[0]} confirmado(a)!`);

        // Atualiza card para estado "já presente"
        const pill = document.getElementById('r-status-pill');
        pill.textContent = '✓ Presente';
        pill.className = 'result-status status-presente';
        document.getElementById('result-card').className = 'result-card visible state-confirmado';

        btn.className = 'btn-confirmar done';
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg> Presença confirmada`;

        document.getElementById('result-actions').innerHTML = `
          <div class="btn-confirmar done" style="flex:1; height:50px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:15px; font-weight:600; border-radius:10px; background:var(--verde-700); color:#fff;">
            <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg>
            Presença confirmada
          </div>
          <button class="btn-nova-busca" onclick="novaBusca()">
            <svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 18 9 12 15 6"/></svg>
            Próximo
          </button>`;

      } else {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg> Confirmar presença`;
        showMsg('erro', dados.mensagem || 'Não foi possível confirmar. Tente novamente.');
      }

    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg> Confirmar presença`;
      showMsg('erro', 'Erro de conexão. Tente novamente.');
      console.error(err);
    }
  }

  // ── Nova busca ────────────────────────────────────────────────────────────
  function novaBusca() {
    inscricaoAtual = null;
    ocultarResultado();
    clearMsg();
    ['inp-nome','inp-telefone','inp-pedido'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    setTimeout(() => document.getElementById('inp-' + tabAtual)?.focus(), 60);
  }

  // ── Contador ──────────────────────────────────────────────────────────────
  function atualizarContador(presentes, inscritos) {
    if (presentes !== null) cntPresentes = presentes;
    if (inscritos  !== null) cntInscritos  = inscritos;
    document.getElementById('cnt-presentes').textContent = cntPresentes;
    document.getElementById('cnt-inscritos').textContent = cntInscritos !== null ? cntInscritos : '—';
    if (cntInscritos) {
      const pct = Math.round((cntPresentes / cntInscritos) * 100);
      document.getElementById('cnt-pct').textContent = pct + '%';
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  function mostrarToast(texto) {
    const t = document.getElementById('toast');
    document.getElementById('toast-text').textContent = texto;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── Recentes ──────────────────────────────────────────────────────────────
  function adicionarRecente(nome) {
    const section = document.getElementById('recent-section');
    const list    = document.getElementById('recent-list');
    section.style.display = 'block';

    const agora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const item  = document.createElement('div');
    item.className = 'recent-item';
    item.innerHTML = `
      <div class="recent-dot"></div>
      <span class="recent-name">${nome || '—'}</span>
      <span class="recent-time">${agora}</span>`;

    list.insertBefore(item, list.firstChild);

    // Manter no máximo 8 recentes
    while (list.children.length > 8) list.removeChild(list.lastChild);
  }

  // ── Enter para buscar ─────────────────────────────────────────────────────
  ['inp-nome','inp-telefone','inp-pedido'].forEach(id => {
    document.getElementById(id)?.addEventListener('keydown', e => {
      if (e.key === 'Enter') buscar();
    });
  });
</script>
</body>
</html>
